<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lonesome No More - See how AI companionship works through a real conversation demo.">

    <meta property="og:title" content="Lonesome No More - Demo">
    <meta property="og:description" content="Watch how Lonesome No More provides warm, personalized companionship through phone conversations.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://lonesomenomore.com/logo.png">

    <title>Demo - Lonesome No More</title>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #5F7A61;
            --secondary-color: #D4735E;
            --accent-color: #E8AA6B;
            --text-dark: #2C2C2C;
            --text-medium: #5A5A5A;
            --bg-cream: #FBF8F3;
            --bg-light: #FFFEFB;
            --shadow-sm: 0 2px 8px rgba(92, 122, 97, 0.08);
            --shadow-md: 0 4px 16px rgba(92, 122, 97, 0.1);
            --shadow-lg: 0 8px 24px rgba(92, 122, 97, 0.12);
            --shadow-xl: 0 12px 32px rgba(92, 122, 97, 0.15);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-dark);
            line-height: 1.8;
            background: var(--bg-cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav */
        nav {
            background: var(--bg-light);
            border-bottom: 1px solid rgba(95, 122, 97, 0.1);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-dark);
        }

        .nav-brand img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }

        .nav-brand span {
            font-family: 'Merriweather', serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--primary-color);
        }

        .nav-back {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color var(--transition-base);
        }

        .nav-back:hover {
            color: var(--secondary-color);
        }

        /* Main */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .demo-header {
            text-align: center;
            max-width: 640px;
            margin-bottom: 40px;
        }

        .demo-header h1 {
            font-family: 'Merriweather', serif;
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .demo-header p {
            font-size: clamp(16px, 2.5vw, 18px);
            color: var(--text-medium);
            line-height: 1.6;
        }

        /* Video container */
        .video-container {
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        .video-frame {
            background: var(--bg-light);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            position: relative;
        }

        .video-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(95, 122, 97, 0.08);
            pointer-events: none;
            z-index: 1;
        }

        .video-frame iframe,
        .video-frame video {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            border-radius: var(--radius-xl);
            background: #1a1a1a;
        }

        /* Decorative glow behind video */
        .video-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% + 40px);
            height: calc(100% + 40px);
            background: radial-gradient(
                ellipse at center,
                rgba(95, 122, 97, 0.06) 0%,
                rgba(232, 170, 107, 0.04) 40%,
                transparent 70%
            );
            border-radius: 28px;
            z-index: -1;
        }

        /* CTA below video */
        .demo-cta {
            text-align: center;
            margin-top: 40px;
            max-width: 640px;
        }

        .demo-cta p {
            color: var(--text-medium);
            font-size: 16px;
            margin-bottom: 20px;
        }

        .cta-button {
            display: inline-block;
            padding: 14px 36px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border-radius: var(--radius-md);
            transition: all var(--transition-base);
            box-shadow: var(--shadow-md);
        }

        .cta-button:hover {
            background: #4e6950;
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-medium);
            font-size: 14px;
            border-top: 1px solid rgba(95, 122, 97, 0.08);
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            main {
                padding: 32px 16px;
            }

            .demo-header {
                margin-bottom: 28px;
            }

            .video-frame {
                border-radius: var(--radius-lg);
            }

            .video-frame iframe {
                border-radius: var(--radius-lg);
            }

            .video-frame::before {
                border-radius: var(--radius-lg);
            }

            .video-container::before {
                display: none;
            }

            nav {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">
            <img src="../logo.png" alt="Lonesome No More">
            <span>Lonesome No More</span>
        </a>
        <a href="/" class="nav-back">&larr; Back to Home</a>
    </nav>

    <main>
        <div class="demo-header">
            <h1>See It in Action</h1>
            <p>Watch how Lonesome No More brings warmth and connection through natural, personalized conversations.</p>
        </div>

                    src="https://www.youtube.com/embed/Jq0kt2mvDtE"

                    allowfullscreen

        -->

        <div class="video-container">
            <div class="video-frame">
                <video controls preload="metadata">
                    <source src="demo100.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>

        <div class="demo-cta">
            <p>Ready to bring companionship to someone you love?</p>
            <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                <a href="mailto:hello@lonesomenomore.com" class="cta-button" style="display: inline-flex; align-items: center; gap: 8px;">
                    <i class="fas fa-envelope"></i> hello@lonesomenomore.com
                </a>
                <a href="tel:+18338174646" class="cta-button" style="display: inline-flex; align-items: center; gap: 8px; background: var(--secondary-color);">
                    <i class="fas fa-phone-alt"></i> (833) 817-4646
                </a>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 <a href="/">Lonesome No More</a>
    </footer>
</body>
</html>
